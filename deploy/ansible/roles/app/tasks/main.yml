---
- name: Create application directory
  ansible.builtin.file:
    path: /opt/rustyip
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create HAProxy directory
  ansible.builtin.file:
    path: /opt/rustyip/haproxy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create TLS certificate directory
  ansible.builtin.file:
    path: /opt/rustyip/haproxy/certs
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy TLS origin certificate
  ansible.builtin.copy:
    content: "{{ origin_cert }}\n{{ origin_key }}"
    dest: /opt/rustyip/haproxy/certs/origin.pem
    owner: root
    group: root
    mode: "0600"
  notify: Reload haproxy

- name: Deploy environment file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/rustyip/.env
    owner: root
    group: root
    mode: "0600"

- name: Log in to GHCR
  ansible.builtin.shell: |
    echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_user }}" --password-stdin
  no_log: true
  changed_when: true

- name: Pull application image
  ansible.builtin.shell: |
    docker pull "{{ app_image }}"
  changed_when: true

# --- Determine deployment state ---

- name: Check for existing active color state file
  ansible.builtin.stat:
    path: /opt/rustyip/.active_color
  register: active_color_stat

- name: Read active color from state file
  ansible.builtin.slurp:
    src: /opt/rustyip/.active_color
  register: active_color_file
  when: active_color_stat.stat.exists

- name: Set color facts for existing deployment
  ansible.builtin.set_fact:
    current_active: "{{ (active_color_file.content | b64decode | trim) }}"
    deploy_target: "{{ 'green' if (active_color_file.content | b64decode | trim) == 'blue' else 'blue' }}"
    is_first_deploy: false
  when: active_color_stat.stat.exists

- name: Set color facts for first deployment
  ansible.builtin.set_fact:
    current_active: ""
    deploy_target: "blue"
    is_first_deploy: true
  when: not active_color_stat.stat.exists

# --- Deploy docker-compose.yml (shared across both paths) ---

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/rustyip/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

# --- First Deployment ---
# On first deploy, HAProxy config can be written early since nothing is live yet.

- name: Deploy HAProxy configuration (first deploy)
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /opt/rustyip/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  vars:
    active_color: "{{ deploy_target }}"
  when: is_first_deploy

- name: Start target app container (first deploy)
  ansible.builtin.shell: |
    docker compose -f /opt/rustyip/docker-compose.yml up -d "app-{{ deploy_target }}"
  changed_when: true
  when: is_first_deploy

- name: Wait for target container health check (first deploy)
  ansible.builtin.shell: |
    for i in $(seq 1 30); do
      status=$(docker inspect --format='{% raw %}{{.State.Health.Status}}{% endraw %}' "rustyip-app-{{ deploy_target }}" 2>/dev/null)
      if [ "$status" = "healthy" ]; then
        echo "healthy"
        exit 0
      fi
      sleep 2
    done
    echo "timeout"
    exit 1
  changed_when: false
  when: is_first_deploy

- name: Start HAProxy (first deploy)
  ansible.builtin.shell: |
    docker compose -f /opt/rustyip/docker-compose.yml up -d haproxy
  changed_when: true
  when: is_first_deploy

- name: Write active color state file (first deploy)
  ansible.builtin.copy:
    content: "{{ deploy_target }}"
    dest: /opt/rustyip/.active_color
    owner: root
    group: root
    mode: "0644"
  when: is_first_deploy

# --- Blue-Green Deployment ---
# The HAProxy config is written AFTER the standby container passes its health check,
# so that on-disk config always reflects the actual healthy state.

- name: Blue-green deployment
  when: not is_first_deploy
  block:
    - name: Start standby container with new image
      ansible.builtin.shell: |
        docker compose -f /opt/rustyip/docker-compose.yml up -d "app-{{ deploy_target }}"
      changed_when: true

    - name: Wait for standby container health check
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          status=$(docker inspect --format='{% raw %}{{.State.Health.Status}}{% endraw %}' "rustyip-app-{{ deploy_target }}" 2>/dev/null)
          if [ "$status" = "healthy" ]; then
            echo "healthy"
            exit 0
          fi
          sleep 2
        done
        echo "timeout"
        exit 1
      changed_when: false

    - name: Deploy HAProxy configuration (switch to new backend)
      ansible.builtin.template:
        src: haproxy.cfg.j2
        dest: /opt/rustyip/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: "0644"
      vars:
        active_color: "{{ deploy_target }}"

    - name: Reload HAProxy in-place to switch traffic
      ansible.builtin.shell: |
        docker kill -s HUP rustyip-haproxy
      changed_when: true

    - name: Wait for HAProxy to settle
      ansible.builtin.pause:
        seconds: 5

    - name: Stop old active container
      ansible.builtin.shell: |
        docker compose -f /opt/rustyip/docker-compose.yml stop "app-{{ current_active }}"
        docker compose -f /opt/rustyip/docker-compose.yml rm -f "app-{{ current_active }}"
      changed_when: true

    - name: Update active color state file
      ansible.builtin.copy:
        content: "{{ deploy_target }}"
        dest: /opt/rustyip/.active_color
        owner: root
        group: root
        mode: "0644"

  rescue:
    - name: Stop failed standby container
      ansible.builtin.shell: |
        docker compose -f /opt/rustyip/docker-compose.yml stop "app-{{ deploy_target }}" || true
        docker compose -f /opt/rustyip/docker-compose.yml rm -f "app-{{ deploy_target }}" || true
      changed_when: true

    - name: Restore HAProxy configuration to current active color
      ansible.builtin.template:
        src: haproxy.cfg.j2
        dest: /opt/rustyip/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: "0644"
      vars:
        active_color: "{{ current_active }}"

    - name: Reload HAProxy to restore original backend
      ansible.builtin.shell: |
        docker kill -s HUP rustyip-haproxy
      changed_when: true
      failed_when: false

    - name: Fail with deployment error
      ansible.builtin.fail:
        msg: >-
          Blue-green deployment failed. Rolled back to app-{{ current_active }}.
          The failed standby container (app-{{ deploy_target }}) has been removed.

- name: Clean up unused Docker images
  ansible.builtin.shell: |
    docker image prune -af --filter "until=1h"
  changed_when: true
  failed_when: false
