---
- name: Wait for cloud-init to finish
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  failed_when: false

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - curl
      - wget
      - htop
      - unattended-upgrades
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - iptables
    state: present

# --- UFW Configuration ---

- name: Set UFW default policy - deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default policy - allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH (port 22) through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH"

- name: Allow HTTPS (port 443) through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "HTTPS"

- name: Enable UFW
  community.general.ufw:
    state: enabled

# --- fail2ban Configuration ---

- name: Deploy fail2ban SSH jail configuration
  ansible.builtin.template:
    src: fail2ban-sshd.conf.j2
    dest: /etc/fail2ban/jail.d/sshd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

# --- Kernel Tuning ---

- name: Deploy sysctl tuning configuration
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-rustyip.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Deploy system-wide file descriptor limits
  ansible.builtin.template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-rustyip.conf
    owner: root
    group: root
    mode: "0644"

# --- Automatic Security Updates ---

- name: Enable unattended-upgrades for security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"
