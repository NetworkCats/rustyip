<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ status_code }} {{ status_text }} - {{ site_domain }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap">
  <link rel="stylesheet" href="/static/style.css?v={{ css_version }}">
</head>
<body>
  <main>
    <div class="error-page">
      <h1 class="error-code">{{ status_code }}</h1>
      <p class="error-status">{{ status_text }}</p>
      <p class="error-detail">{{ error_message }}</p>
      <a href="/" class="error-home-link">Go to Home</a>
    </div>
  </main>
</body>
</html>
