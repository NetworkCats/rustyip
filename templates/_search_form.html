<form method="GET" action="/{{ lang_tag }}" class="search-form" role="search">
  <div class="search-input-wrap">
    <label for="ip-search" class="sr-only">{{ t_search_label }}</label>
    <i class="icon-magnifier search-icon" aria-hidden="true"></i>
    <input
      id="ip-search"
      type="text"
      name="ip"
      placeholder="{{ t_search_placeholder }}"
      value="{{ query }}"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
      {% if autofocus %}autofocus{% endif %}
    >
  </div>
</form>
