<!DOCTYPE html>
<html lang="{{ lang_tag }}" dir="{{ html_dir }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_domain }}{% endblock %}</title>
  {% block head_meta %}{% endblock %}
  <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" href="/static/icons/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/static/icons/favicon-16x16.png" sizes="16x16">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% block head_preconnect %}{% endblock %}
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap">
  {% block head_stylesheets %}{% endblock %}
  <link rel="stylesheet" href="/static/style.css?v={{ css_version }}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block footer %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
