<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What is my IP address? - {{ site_domain }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.5.5/css/simple-line-icons.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <form method="GET" action="/" class="search-form" role="search">
      <div class="search-input-wrap">
        <label for="ip-search" class="sr-only">Search IP address</label>
        <i class="icon-magnifier search-icon" aria-hidden="true"></i>
        <input
          id="ip-search"
          type="text"
          name="ip"
          placeholder="Type to search IP data"
          value="{{ query }}"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
    </form>

    <h1 class="ip-display">{{ ip }}</h1>

    <table class="info-table" aria-label="IP address information">
      <tbody>
        <tr>
          <td class="label">ASN</td>
          <td>{{ asn }}</td>
        </tr>
        <tr>
          <td class="label">Org</td>
          <td>{{ org }}</td>
        </tr>
        <tr>
          <td class="label">Country</td>
          <td>{{ country }}</td>
        </tr>
        <tr>
          <td class="label">City</td>
          <td>{{ city }}</td>
        </tr>
        <tr>
          <td class="label">Proxy</td>
          <td>{% if is_proxy %}<i class="icon-check bool-true" aria-hidden="true"></i><span class="sr-only">Yes</span>{% else %}<i class="icon-minus bool-false" aria-hidden="true"></i><span class="sr-only">No</span>{% endif %}</td>
        </tr>
        <tr>
          <td class="label">VPN</td>
          <td>{% if is_vpn %}<i class="icon-check bool-true" aria-hidden="true"></i><span class="sr-only">Yes</span>{% else %}<i class="icon-minus bool-false" aria-hidden="true"></i><span class="sr-only">No</span>{% endif %}</td>
        </tr>
        <tr>
          <td class="label">Hosting</td>
          <td>{% if is_hosting %}<i class="icon-check bool-true" aria-hidden="true"></i><span class="sr-only">Yes</span>{% else %}<i class="icon-minus bool-false" aria-hidden="true"></i><span class="sr-only">No</span>{% endif %}</td>
        </tr>
        <tr>
          <td class="label">Tor</td>
          <td>{% if is_tor %}<i class="icon-check bool-true" aria-hidden="true"></i><span class="sr-only">Yes</span>{% else %}<i class="icon-minus bool-false" aria-hidden="true"></i><span class="sr-only">No</span>{% endif %}</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
